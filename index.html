<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>B4L Lineup Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      const themePref = localStorage.getItem('themePref') || 'auto';
      if (themePref === 'dark' || (themePref === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.body.classList.add('dark');
      }
    </script>

    <div id="page-wrapper">
      <header id="logo-title">
        <button id="menu-toggle" type="button" aria-expanded="false" aria-controls="controls">☰</button>
        <img src="https://www.b4l.cz/wp-content/uploads/2024/09/logo_bfl_2024_25.svg" alt="B4L Lineup Planner">
        <h2>LINEUP PLANNER</h2>
      </header>

      <section id="controls" class="collapsed" aria-label="Schedule controls">
        <input id="nickname" placeholder="Your nickname" autocomplete="nickname">
        <select id="filterSelect" multiple aria-label="Filter by attendees"></select>
        <select id="stageSelect" multiple aria-label="Filter by stages"></select>

        <div class="theme-toggle">
          <span class="switch-label">Dark Mode</span>
          <label class="switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="theme-toggle">
          <span class="switch-label">Pin now-playing</span>
          <label class="switch">
            <input type="checkbox" id="pinToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="theme-toggle">
          <span class="switch-label">Dim past shows</span>
          <label class="switch">
            <input type="checkbox" id="pastToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="theme-toggle">
          <span class="switch-label">Show overlaps only</span>
          <label class="switch">
            <input type="checkbox" id="collisionToggle">
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <nav id="tabs" aria-label="Festival days"></nav>
      <main id="schedule"></main>

      <footer id="site-footer">
        <p>
          <strong>B4L Lineup Planner</strong> is a personal project for exploring the festival schedule,
          choosing favorite performances, and seeing which friends are attending.
        </p>
      </footer>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
